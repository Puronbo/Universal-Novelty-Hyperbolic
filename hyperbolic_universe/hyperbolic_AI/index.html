<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Hyperbolic AI</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:#0b0e14; color:#e6edf3; font-family:'SF Mono','Cascadia Code','Fira Code','Consolas',monospace; height:100vh; display:flex; flex-direction:column; font-size:13px; line-height:1.6; }

  .header { display:flex; align-items:center; gap:8px; padding:8px 16px; border-bottom:1px solid #21262d; background:#0d1117; flex-shrink:0; }
  .header .logo { width:22px; height:22px; border-radius:3px; background:linear-gradient(135deg,#f2c744,#f0883e); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:bold; color:#0b0e14; }
  .header h1 { font-size:13px; font-weight:600; }
  .header .badge { font-size:10px; color:#484f58; margin-left:4px; }
  .header .spacer { flex:1; }
  .header .status { display:flex; align-items:center; gap:5px; font-size:11px; color:#8b949e; }
  .header .dot { width:6px; height:6px; border-radius:50%; background:#484f58; }
  .header .dot.online { background:#3fb950; }
  .header .lockout-badge { display:none; align-items:center; gap:4px; font-size:10px; color:#f85149; background:#f8514911; border:1px solid #f8514933; border-radius:4px; padding:1px 6px; margin-left:6px; }
  .header .lockout-badge.show { display:inline-flex; }
  .input-row.locked { border-color:#f85149; background:#f8514908; }
  .input-row.locked textarea::placeholder { color:#f8514966; }
  .lockout-msg { display:none; margin-bottom:6px; padding:8px 10px; background:#f8514908; border:1px solid #f8514933; border-radius:4px; font-size:11px; color:#f85149; }
  .lockout-msg.show { display:block; }
  .lockout-msg .phrase { color:#f2c744; font-size:13px; display:block; margin-top:4px; padding:6px 8px; background:#0b0e14; border-radius:3px; border:1px solid #30363d; }
  .header.locked, .bottom-bar.locked { border-color:#f85149; }
  .header.locked .lockout-badge.show { display:inline-flex; }

  .main { flex:1; display:flex; overflow:hidden; }

  /* chat */
  .chat-area { flex:1; display:flex; flex-direction:column; min-width:0; }
  .messages { flex:1; overflow-y:auto; padding:12px 16px; }
  .msg { margin-bottom:6px; display:flex; gap:8px; }
  .msg .prefix { flex-shrink:0; font-weight:600; white-space:pre; }
  .msg.user .prefix { color:#58a6ff; }
  .msg.ai .prefix { color:#f2c744; }
  .msg .content { flex:1; min-width:0; white-space:pre-wrap; word-break:break-word; }
  .msg.ai .content .typing-cursor { display:inline-block; width:6px; height:14px; background:#f2c744; animation:blink 0.8s infinite; vertical-align:text-bottom; margin-left:2px; }
  @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }
  .msg .content blockquote { border-left:2px solid #30363d; padding-left:10px; margin:4px 0; color:#8b949e; }

  .thinking-line { display:flex; gap:4px; align-items:center; padding:4px 0; margin-bottom:6px; margin-left:68px; }
  .thinking-line span { width:4px; height:4px; border-radius:50%; background:#8b949e; animation:bounce 1.2s infinite; }
  .thinking-line span:nth-child(2) { animation-delay:0.2s; }
  .thinking-line span:nth-child(3) { animation-delay:0.4s; }
  @keyframes bounce { 0%,80%,100% { transform:translateY(0); } 40% { transform:translateY(-3px); } }

  /* input */
  .input-area { padding:8px 16px 12px; flex-shrink:0; }
  .input-row { display:flex; gap:6px; background:#151922; border:1px solid #30363d; border-radius:6px; padding:6px 10px; }
  .input-row textarea { flex:1; background:transparent; border:none; color:#e6edf3; font-size:13px; font-family:inherit; resize:none; outline:none; min-height:20px; max-height:100px; line-height:1.5; }
  .input-row textarea::placeholder { color:#484f58; }
  .input-row button { background:transparent; color:#8b949e; border:1px solid #30363d; width:28px; height:28px; border-radius:4px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; align-self:flex-end; font-size:13px; }
  .input-row button:hover { border-color:#58a6ff; color:#58a6ff; }
  .input-row button:disabled { opacity:0.3; cursor:not-allowed; }

  /* sidebar */
  .sidebar { width:280px; border-left:1px solid #21262d; background:#0d1117; display:none; flex-direction:column; overflow-y:auto; }
  .sidebar.show { display:flex; }
  .sidebar section { padding:12px 14px; border-bottom:1px solid #21262d; }
  .sidebar h3 { font-size:10px; text-transform:uppercase; color:#484f58; letter-spacing:0.5px; margin-bottom:8px; }
  #widgetCanvas { width:100%; height:200px; border-radius:4px; background:#151922; }
  .stat-row { display:flex; justify-content:space-between; padding:2px 0; font-size:11px; color:#8b949e; }
  .stat-row .label { color:#484f58; }
  .thought { font-size:11px; color:#8b949e; padding:6px 0; border-top:1px solid #151922; }
  .thought:first-child { border-top:none; }
  .thought .time { color:#484f58; font-size:10px; }
  .affect-tag { display:inline-block; padding:1px 6px; border-radius:3px; font-size:10px; margin-right:3px; }
  .affect-tag.alert { background:#f8514933; color:#f85149; }
  .affect-tag.curious { background:#58a6ff33; color:#58a6ff; }
  .affect-tag.calm { background:#3fb95033; color:#3fb950; }
  .affect-tag.tense { background:#f0883e33; color:#f0883e; }
  .affect-tag.uneasy { background:#f8514933; color:#f85149; }
  .affect-tag.reflective { background:#bc8cff33; color:#bc8cff; }
  .affect-tag.analytic { background:#79c0ff33; color:#79c0ff; }

  /* bottom bar */
  .bottom-bar { display:flex; align-items:center; gap:12px; padding:4px 16px; border-top:1px solid #21262d; background:#0d1117; font-size:10px; color:#484f58; flex-shrink:0; }
  .bottom-bar .sep { color:#21262d; }
  .bottom-bar .feeling { color:#8b949e; cursor:pointer; }
  .bottom-bar .feeling:hover { color:#e6edf3; }

  /* scrollbar */
  .messages::-webkit-scrollbar { width:5px; }
  .messages::-webkit-scrollbar-track { background:transparent; }
  .messages::-webkit-scrollbar-thumb { background:#30363d; border-radius:3px; }

  @media (max-width:700px) { .sidebar.show { display:none; } }
</style>
</head>
<body>

<div class="header">
  <div class="logo">H</div>
  <h1>Hyperbolic AI</h1>
  <span class="badge">γ</span>
  <div class="spacer"></div>
  <div class="status">
    <span class="dot online" id="statusDot"></span>
    <span id="statusText">connected</span>
    <span class="lockout-badge" id="lockoutBadge">🔒 LOCKED</span>
  <span class="lockout-badge" id="userBadge" style="color:#3fb950;background:#3fb95011;border-color:#3fb95033;display:none;">👤</span>
  </div>
</div>

<div class="main">
  <div class="chat-area">
    <div class="messages" id="messages">
      <div id="messageList"></div>
    </div>
    <div class="input-area">
      <div class="lockout-msg" id="lockoutMsg">
        🔒 Locked. Say this to get back in:
        <span class="phrase" id="lockoutPhrase"></span>
      </div>
      <div class="input-row" id="inputRow">
        <textarea id="input" rows="1" placeholder="Type a message..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
        <button id="sendBtn" onclick="send()">&#8593;</button>
      </div>
    </div>
  </div>
  <!-- Sidebar -->
  <div class="sidebar show" id="sidebar">
    <section>
      <h3>Three-Disk Overlay</h3>
      <div style="position:relative">
        <canvas id="widgetCanvas" width="252" height="252"></canvas>
        <div id="diskLegend" style="position:absolute;top:4px;right:4px;font-size:9px;line-height:1.8;text-align:right;color:#8b949e;">
          <span style="color:#f2c744">▲</span> anchor
          <span style="color:#f0883e;margin-left:4px">◆</span> topic
          <span style="color:#3fb950;margin-left:4px">●</span> known
          <span style="color:#f85149;margin-left:4px">●</span> anomaly
          <span style="color:#58a6ff;margin-left:4px">◎</span> user
          <span style="color:#bc8cff;margin-left:4px">✦</span> self
        </div>
      </div>
      <div style="margin-top:8px">
        <div class="stat-row"><span class="label">Known</span><span id="wKnown">0</span></div>
        <div class="stat-row"><span class="label">Anomalies</span><span id="wAnomaly">0</span></div>
        <div class="stat-row"><span class="label">Topics</span><span id="wTopics">0</span></div>
        <div class="stat-row"><span class="label">Users</span><span id="wUsers">0</span></div>
        <div class="stat-row"><span class="label">Self Events</span><span id="wSelf">0</span></div>
      </div>
    </section>
    <section id="overlapsSection" style="display:none">
      <h3>User Bridges</h3>
      <div id="overlapsDisplay"></div>
    </section>
    <section id="dreamsSection" style="display:none">
      <h3>Dreams</h3>
      <div id="dreamsDisplay"></div>
    </section>
    <section id="mindSection">
      <h3>Mind</h3>
      <div id="affectDisplay"></div>
      <div id="thoughtsDisplay"></div>
    </section>
  </div>
</div>

<div class="bottom-bar">
  <span id="barThought">listening...</span>
  <span class="sep">|</span>
  <span id="barAffect" class="feeling" onclick="document.getElementById('sidebar').classList.toggle('show')">⏣ calm</span>
  <span class="sep">|</span>
  <span id="barItems">0 items</span>
  <span class="sep">|</span>
  <span id="barTopics">0 topics</span>
</div>

<script>
// ---- state ----
let conversation = [];
let isStreaming = false;
let diskData = null;

// ---- Poincaré disk canvas ----
const canvas = document.getElementById('widgetCanvas');
const ctx = canvas.getContext('2d');
const S = 116; // scale factor: half of canvas minus padding
const CX = 126, CY = 126;

function toScreen(x, y) {
  return [CX + x * S, CY - y * S];
}

function drawDisk() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // --- Disk boundary ---
  ctx.beginPath();
  ctx.arc(CX, CY, S, 0, 2 * Math.PI);
  ctx.strokeStyle = '#30363d';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Concentric guide rings
  for (let r of [0.25, 0.5, 0.75]) {
    ctx.beginPath();
    ctx.arc(CX, CY, S * r, 0, 2 * Math.PI);
    ctx.strokeStyle = '#151922';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  if (!diskData) return;

  // --- Data Disk: history items ---
  const history = diskData.history || [];
  for (const h of history) {
    const c = h.coords;
    if (!c) continue;
    const [sx, sy] = toScreen(c[0], c[1]);
    ctx.beginPath();
    ctx.arc(sx, sy, 2.5, 0, 2 * Math.PI);
    ctx.fillStyle = h.tag === 'anomaly' ? '#f85149' : '#3fb950';
    ctx.globalAlpha = 0.6;
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // --- User Disk: user regions ---
  const users = diskData.users || [];
  for (const u of users) {
    const reg = u.region;
    if (!reg) continue;
    const [sx, sy] = toScreen(reg[0], reg[1]);
    ctx.beginPath();
    ctx.arc(sx, sy, 6, 0, 2 * Math.PI);
    ctx.strokeStyle = '#58a6ff';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.fillStyle = '#58a6ff22';
    ctx.fill();
    ctx.fillStyle = '#58a6ff';
    ctx.font = '9px monospace';
    ctx.fillText(u.name.substring(0, 8), sx + 8, sy + 3);
  }

  // --- Self Disk: self-chain events ---
  const selfChain = diskData.self_chain || [];
  for (const e of selfChain) {
    // Place self events at random nearby positions determined by type
    const hash = (s) => { let h=0; for(let i=0;i<s.length;i++) h=((h<<5)-h)+s.charCodeAt(i); return h; };
    const h = hash(e.type + (e.text||''));
    const angle = (h % 10000) / 10000 * 2 * Math.PI;
    const radius = 0.3 + (h % 5000) / 10000 * 0.5;
    const [sx, sy] = toScreen(radius * Math.cos(angle), radius * Math.sin(angle));
    ctx.beginPath();
    ctx.arc(sx, sy, 3, 0, 2 * Math.PI);
    ctx.fillStyle = '#bc8cff';
    ctx.globalAlpha = 0.7;
    ctx.fill();
    ctx.globalAlpha = 1;
    // Glow
    ctx.shadowColor = '#bc8cff';
    ctx.shadowBlur = 6;
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  // --- Topics ---
  const topics = diskData.topics || [];
  for (const t of topics) {
    const [sx, sy] = toScreen(t.x, t.y);
    // Diamond shape
    ctx.beginPath();
    ctx.moveTo(sx, sy - 5);
    ctx.lineTo(sx + 4, sy);
    ctx.lineTo(sx, sy + 5);
    ctx.lineTo(sx - 4, sy);
    ctx.closePath();
    ctx.fillStyle = '#f0883e';
    ctx.fill();
    ctx.strokeStyle = '#f0883e';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // --- Anchors ---
  const anchors = diskData.anchors || [];
  for (const a of anchors) {
    const [sx, sy] = toScreen(a.x, a.y);
    // Triangle
    ctx.beginPath();
    ctx.moveTo(sx, sy - 6);
    ctx.lineTo(sx + 5, sy + 4);
    ctx.lineTo(sx - 5, sy + 4);
    ctx.closePath();
    ctx.fillStyle = '#f2c744';
    ctx.fill();
    ctx.fillStyle = '#f2c744';
    ctx.font = '9px monospace';
    ctx.fillText(a.id.replace('Anchor: ', '').substring(0, 12).toUpperCase(), sx - 20, sy - 10);
  }
}

function updateWidget() {
  drawDisk();
  if (!diskData) return;
  const history = diskData.history || [];
  const known = history.filter(h => h.tag === 'known').length;
  const anom = history.filter(h => h.tag === 'anomaly').length;
  document.getElementById('wKnown').textContent = known;
  document.getElementById('wAnomaly').textContent = anom;
  document.getElementById('wTopics').textContent = (diskData.topics||[]).length;
  document.getElementById('wUsers').textContent = (diskData.users||[]).length;
  document.getElementById('wSelf').textContent = (diskData.self_chain||[]).length;
  document.getElementById('barItems').textContent = known + anom + ' items';
  document.getElementById('barTopics').textContent = (diskData.topics||[]).length + ' topics';
}

// ---- mind state ----
function updateLockout(lockout) {
  const badge = document.getElementById('lockoutBadge');
  const msg = document.getElementById('lockoutMsg');
  const phrase = document.getElementById('lockoutPhrase');
  const input = document.getElementById('input');
  const inputRow = document.getElementById('inputRow');
  const header = document.querySelector('.header');
  const bar = document.querySelector('.bottom-bar');

  if (lockout && lockout.status === 'locked_out') {
    badge.classList.add('show');
    msg.classList.add('show');
    phrase.textContent = lockout.phrase || '...';
    input.placeholder = 'Say the phrase to get back in...';
    inputRow.classList.add('locked');
    header.classList.add('locked');
    bar.classList.add('locked');
  } else if (lockout && lockout.status === 'warned') {
    badge.textContent = '⚠️ WARNED';
    badge.classList.add('show');
    msg.classList.remove('show');
    input.placeholder = 'Type a message...';
    inputRow.classList.remove('locked');
    header.classList.remove('locked');
    bar.classList.remove('locked');
  } else {
    badge.classList.remove('show');
    msg.classList.remove('show');
    input.placeholder = 'Type a message...';
    inputRow.classList.remove('locked');
    header.classList.remove('locked');
    bar.classList.remove('locked');
  }
}

async function pollMind() {
  try {
    const [mindRes, diskRes] = await Promise.all([
      fetch('/api/mind'),
      fetch('/api/disk')
    ]);
    const data = await mindRes.json();
    const affect = data.affect || {};
    const thoughts = data.thoughts || [];
    const lockout = data.lockout || {};

    // Lockout state
    updateLockout(lockout);

    // Affect tags
    const affEl = document.getElementById('affectDisplay');
    if (affect.top_feelings) {
      affEl.innerHTML = affect.top_feelings.map(f =>
        `<span class="affect-tag ${f}">${f}</span>`
      ).join('') + `<span style="font-size:10px;color:#484f58;margin-left:6px">${affect.dominant_region?.replace(/_/g,' ')}</span>`;
      document.getElementById('barAffect').textContent = '⏣ ' + affect.top_feelings[0];
    }

    // Thoughts
    const thEl = document.getElementById('thoughtsDisplay');
    if (thoughts.length) {
      thEl.innerHTML = thoughts.slice(-5).reverse().map(t => {
        const ago = Math.floor((Date.now()/1000 - t.timestamp) / 60);
        return `<div class="thought"><div class="time">${ago}m ago</div><div>${t.text.slice(0,120)}${t.text.length > 120 ? '...' : ''}</div></div>`;
      }).join('');
      const last = thoughts[thoughts.length - 1];
      if (last) {
        document.getElementById('barThought').textContent = '💭 ' + last.text.slice(0,80) + (last.text.length > 80 ? '...' : '');
      }
    }

    // Disk overlay data + overlaps
    const disk = await diskRes.json();
    diskData = disk;
    drawDisk();
    document.getElementById('wKnown').textContent = (disk.history||[]).filter(h => h.tag === 'known').length;
    document.getElementById('wAnomaly').textContent = (disk.history||[]).filter(h => h.tag === 'anomaly').length;
    document.getElementById('wTopics').textContent = (disk.topics||[]).length;
    document.getElementById('wUsers').textContent = (disk.users||[]).length;
    document.getElementById('wSelf').textContent = (disk.self_chain||[]).length;
    document.getElementById('barItems').textContent = ((disk.history||[]).length) + ' items';
    document.getElementById('barTopics').textContent = (disk.topics||[]).length + ' topics';

    // User overlaps
    const ovRes = await fetch('/api/user_overlaps');
    const ov = await ovRes.json();
    const ovSection = document.getElementById('overlapsSection');
    const ovDisplay = document.getElementById('overlapsDisplay');
    if (ov.length > 0) {
      ovSection.style.display = '';
      ovDisplay.innerHTML = ov.map(o =>
        `<div class="thought"><div class="time">${o.user_a} ↔ ${o.user_b}</div><div style="color:#8b949e;font-size:10px"># ${o.common_words.slice(0,5).join(', ')}</div></div>`
      ).join('');
    } else {
      ovSection.style.display = 'none';
    }
  } catch(e) {}
}

// ---- chat ----
async function send() {
  const input = document.getElementById('input');
  const msg = input.value.trim();
  if (!msg || isStreaming) return;
  input.value = '';

  addMessage('user', msg);
  conversation.push({role:'user', content:msg});

  const list = document.getElementById('messageList');
  const thinkLine = document.createElement('div');
  thinkLine.className = 'thinking-line';
  thinkLine.id = 'thinking';
  thinkLine.innerHTML = '<span></span><span></span><span></span>';
  list.appendChild(thinkLine);
  list.scrollIntoView({block:'end'});
  isStreaming = true;
  document.getElementById('sendBtn').disabled = true;

  try {
    const res = await fetch('/api/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message: msg})
    });
    const data = await res.json();
    document.getElementById('thinking')?.remove();
    typewriter(data.reply);
    conversation.push({role:'assistant', content:data.reply});
  } catch(e) {
    document.getElementById('thinking')?.remove();
    addMessage('ai', '*Server not reachable. Make sure `python server.py` is running.*');
  }
  isStreaming = false;
  document.getElementById('sendBtn').disabled = false;
}

function addMessage(role, text) {
  const list = document.getElementById('messageList');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const prefix = role === 'user' ? '[You]' : '[Hyperbolic]';
  div.innerHTML = `<span class="prefix">${prefix}:</span><span class="content">${text}</span>`;
  list.appendChild(div);
  list.scrollIntoView({block:'end'});
}

function typewriter(text) {
  const list = document.getElementById('messageList');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.innerHTML = '<span class="prefix">[Hyperbolic]:</span><span class="content"><span></span><span class="typing-cursor"></span></span>';
  list.appendChild(div);
  const textSpan = div.querySelector('.content span');
  const cursorSpan = div.querySelector('.typing-cursor');

  let i = 0;
  function tick() {
    if (i < text.length) {
      textSpan.textContent += text[i];
      i++;
      list.scrollIntoView({block:'end'});
      setTimeout(tick, 6 + Math.random() * 12);
    } else {
      cursorSpan.remove();
    }
  }
  tick();
}

// ---- init ----
async function pollState() {
  try {
    const [diskRes, userRes] = await Promise.all([
      fetch('/api/disk'),
      fetch('/api/user')
    ]);
    const disk = await diskRes.json();
    const user = await userRes.json();
    diskData = disk;
    drawDisk();
    document.getElementById('statusDot').className = 'dot online';
    document.getElementById('statusText').textContent = 'connected — ' + ((disk.history||[]).length) + ' classified';
    
    // User badge
    const userBadge = document.getElementById('userBadge');
    if (user.identified) {
      userBadge.textContent = '👤 ' + user.name;
      userBadge.style.display = 'inline-flex';
    } else {
      userBadge.style.display = 'none';
    }
  } catch(e) {
    document.getElementById('statusDot').className = 'dot';
    document.getElementById('statusDot').style.background = '#f85149';
    document.getElementById('statusText').textContent = 'offline — run python server.py';
  }
}

// ---- SSE for real-time dreams / thoughts ----
function connectSSE() {
  const evtSource = new EventSource('/api/stream');
  evtSource.onmessage = function(e) {
    try {
      const evt = JSON.parse(e.data);
      if (evt.type === 'dream' && evt.dream) {
        const d = evt.dream.data || {};
        const dreamEl = document.getElementById('dreamsDisplay');
        const section = document.getElementById('dreamsSection');
        section.style.display = '';
        const text = (d.text || '').slice(0, 100);
        dreamEl.innerHTML = `<div class="thought"><div class="time">just now</div><div style="color:#bc8cff">${text}</div></div>` + dreamEl.innerHTML;
        if (dreamEl.children.length > 5) dreamEl.removeChild(dreamEl.lastChild);
      }
    } catch(e) {}
  };
}

window.onload = function() {
  pollState();
  setInterval(pollState, 4000);
  setInterval(pollMind, 5000);
  connectSSE();
  setTimeout(() => {
    typewriter(
      "Hello. I'm **Hyperbolic** — a conversational AI powered by hyperbolic geometry. I perceive information through a Poincaré disk manifold, measuring entropy and topic proximity instead of using a language model. You should tell me your name so I can remember you."
    );
  }, 500);
};
</script>
</body>
</html>
