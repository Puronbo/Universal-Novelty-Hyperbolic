<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hyperbolic Manifold Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  body { background:#0b0e14; color:#c9d1d9; font-family:sans-serif; padding:24px; }
  .container { max-width:900px; margin:auto; }
  h1 { font-size:1.3rem; }
  #canvas-wrap { background:#151922; border:1px solid #262c36; border-radius:8px;
                 padding:20px; height:520px; }
  .stats { display:flex; gap:16px; margin:14px 0; }
  .stat { background:#151922; border:1px solid #262c36; border-radius:8px;
          padding:10px 16px; flex:1; text-align:center; }
  .stat b { display:block; font-size:1.4rem; }
  .log { background:#070a0f; height:160px; overflow-y:auto; padding:10px;
         border-radius:8px; font-family:monospace; font-size:12px; margin-top:12px; }
  button { background:#1f6feb; color:white; border:none; padding:8px 14px;
           border-radius:6px; cursor:pointer; margin-right:8px; }
  button:hover { background:#3182f6; }
  button.danger { background:#b62324; }
</style>
</head>
<body>
<div class="container">
  <h1>Hyperbolic Manifold: Persistent Novelty-Detection Map</h1>

  <div class="stats">
    <div class="stat"><b id="stat-secured">0</b>Secured</div>
    <div class="stat"><b id="stat-anomaly">0</b>Anomalies</div>
    <div class="stat"><b id="stat-total">0</b>Total Nodes</div>
  </div>

  <div id="canvas-wrap"><canvas id="manifoldCanvas"></canvas></div>

  <div style="margin-top:12px;">
    <button onclick="loadFromServer()">Load web_data.json</button>
    <button onclick="simulateNode()">Simulate Random Packet</button>
    <button class="danger" onclick="clearMemory()">Clear Saved Memory</button>
  </div>

  <div id="logs" class="log"></div>
</div>

<script>
const STORAGE_KEY = 'manifold_index_data';
let mappedDataPool = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

const ctx = document.getElementById('manifoldCanvas').getContext('2d');
const poincareChart = new Chart(ctx, {
  type: 'scatter',
  data: {
    datasets: [
      {
        label: 'Anchors',
        data: [],
        backgroundColor: '#f2c744',
        pointRadius: 8,
        pointStyle: 'triangle'
      },
      {
        label: 'Secured',
        data: [],
        backgroundColor: '#3fb950',
        pointRadius: 5
      },
      {
        label: 'Anomalies',
        data: [],
        backgroundColor: '#f85149',
        pointRadius: 5
      }
    ]
  },
  options: {
    scales: {
      x: { min: -1.1, max: 1.1, grid: { color: '#262c36' } },
      y: { min: -1.1, max: 1.1, grid: { color: '#262c36' } }
    },
    plugins: {
      legend: { labels: { color: '#c9d1d9' } },
      tooltip: {
        callbacks: {
          label: (item) => item.raw.label || `(${item.raw.x.toFixed(2)}, ${item.raw.y.toFixed(2)})`
        }
      }
    }
  }
});

function appendLog(msg) {
  const log = document.getElementById('logs');
  log.innerHTML += `<div>${msg}</div>`;
  log.scrollTop = log.scrollHeight;
}

function saveToMemory() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(mappedDataPool));
}

function clearMemory() {
  localStorage.removeItem(STORAGE_KEY);
  mappedDataPool = [];
  redraw();
  appendLog('[SYSTEM]: Memory cleared.');
}

function redraw() {
  const anchors = mappedDataPool.filter(n => n.type === 'anchor');
  const secured = mappedDataPool.filter(n => n.type === 'known');
  const anomalies = mappedDataPool.filter(n => n.type === 'anomaly');

  poincareChart.data.datasets[0].data = anchors;
  poincareChart.data.datasets[1].data = secured;
  poincareChart.data.datasets[2].data = anomalies;
  poincareChart.update();

  document.getElementById('stat-secured').innerText = secured.length;
  document.getElementById('stat-anomaly').innerText = anomalies.length;
  document.getElementById('stat-total').innerText = secured.length + anomalies.length;
}

// Pull the JSON produced by hyperbolic_engine.py (must be served, not opened as file://)
async function loadFromServer() {
  try {
    const res = await fetch('web_data.json', { cache: 'no-store' });
    const data = await res.json();
    mappedDataPool = data;
    saveToMemory();
    redraw();
    appendLog(`[SYSTEM]: Loaded ${data.length} nodes from web_data.json`);
  } catch (e) {
    appendLog('[ERROR]: Could not load web_data.json — run `python3 -m http.server` in this folder and reload the page.');
  }
}

// Client-side demo generator so the dashboard is interactive without the Python engine running
function simulateNode() {
  const isAnomaly = Math.random() < 0.3;
  const angle = Math.random() * Math.PI * 2;
  const radius = isAnomaly ? 0.9 + Math.random() * 0.08 : Math.random() * 0.7;
  const node = {
    id: 'sim_' + Date.now(),
    label: isAnomaly ? 'Simulated anomaly packet' : 'Simulated clean packet',
    x: Math.cos(angle) * radius,
    y: Math.sin(angle) * radius,
    type: isAnomaly ? 'anomaly' : 'known'
  };
  mappedDataPool.push(node);
  saveToMemory();
  redraw();
  appendLog(`[STREAM]: ${node.label} settled at r=${radius.toFixed(3)} (${node.type})`);
}

window.onload = function () {
  if (mappedDataPool.length) {
    redraw();
    appendLog('[SYSTEM]: Memory restored from previous session.');
  } else {
    appendLog('[SYSTEM]: No saved memory found. Click "Load web_data.json" or "Simulate Random Packet".');
  }
};
</script>
</body>
</html>
